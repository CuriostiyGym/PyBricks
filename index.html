<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Blockly to Python with Turtle, OpenCV, MediaPipe & YOLOv8</title>
  <script src="https://unpkg.com/blockly/blockly.min.js"></script>
  <script src="https://unpkg.com/blockly/python_compressed.js"></script>
  <style>
    /* Basic page setup */
    html, body {
      height: 100%;
      margin: 0;
      font-family: Arial, sans-serif;
    }
    
    /* Main container for the two-column layout */
    #container {
      display: flex;
      flex-direction: row;
      height: 100%;
      width: 100%;
    }

    /* Left column for Blockly editor */
    #blocklyContainer {
      flex: 3; /* Takes up 3/5 of the space */
      height: 100%;
      position: relative;
    }
    
    #blocklyDiv {
      height: 100%;
      width: 100%;
    }

    /* Right column for the code and button */
    #codeContainer {
      flex: 2; /* Takes up 2/5 of the space */
      display: flex;
      flex-direction: column;
      height: 100%;
      background: #282c34; /* A darker theme for the code area */
      box-shadow: -2px 0 5px rgba(0,0,0,0.2);
    }
    
    /* Container for all buttons */
    #buttonContainer {
      display: flex;
      flex-wrap: wrap; /* Allows buttons to wrap on smaller screens */
      padding: 5px;
      flex-shrink: 0;
    }
    
    /* Style for the buttons */
    .actionButton {
      padding: 10px;
      margin: 5px;
      border: 1px solid #555;
      background: #4a4f5a;
      color: white;
      cursor: pointer;
      font-size: 1em;
      border-radius: 5px;
      transition: background-color 0.2s;
      flex-grow: 1; /* Make buttons share space */
    }

    .actionButton:hover {
      background: #5a5f6a;
    }

    .actionButton:active {
      background: #3a3f4a;
    }
    
    /* The actual code display area */
    #codeArea {
      flex-grow: 1; /* Fills the remaining vertical space */
      background: #282c34;
      color: #abb2bf;
      padding: 10px;
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 0.9em;
      overflow: auto; /* Add scrollbars if code is long */
      white-space: pre-wrap; /* Wrap long lines */
      margin: 0;
    }
  </style>
</head>
<body>

  <!-- NOTE: For examples to work, the user running the Python code needs:
       1. The required libraries installed:
          pip install opencv-python mediapipe numpy ultralytics pyttsx3 pyautogui screen-brightness-control
       2. A webcam for real-time examples.
       3. For YOLOv8: A pre-trained model file (e.g., 'yolov8n.pt') accessible by the script.
  -->

  <!-- Main layout container -->
  <div id="container">
    <!-- Left side: Blockly editor -->
    <div id="blocklyContainer">
      <div id="blocklyDiv"></div>
    </div>
    <!-- Right side: Code viewer and button -->
    <div id="codeContainer">
      <!-- Container for all buttons -->
      <div id="buttonContainer">
        <button id="saveButton" class="actionButton">Save Project</button>
        <button id="loadButton" class="actionButton">Load Project</button>
        <button id="copyButton" class="actionButton">Copy Python Code</button>
      </div>
      <pre id="codeArea"># Python code will appear here...</pre>
    </div>
  </div>

  <!-- Hidden file input for loading projects -->
  <input type="file" id="loadInput" style="display: none;" accept=".xml, .txt">

  <!-- The Toolbox XML, defining the available blocks and categories -->
  <xml id="toolbox" style="display: none">
    <category name="YOLOv8 (Ultralytics)" colour="25">
        <block type="yolo8_load_model"></block>
        <block type="yolo8_detect_objects"></block>
        <block type="yolo8_for_each_detection"></block>
        <block type="yolo8_get_detection_info"></block>
        <block type="yolo8_draw_detection"></block>
    </category>
    <category name="MediaPipe" colour="210">
        <category name="Setup Models" colour="200">
            <block type="mp_create_hands"></block>
            <block type="mp_create_pose"></block>
            <block type="mp_create_face_mesh"></block>
            <block type="mp_create_holistic"></block>
            <block type="mp_create_face_detection"></block>
            <block type="mp_create_selfie_segmentation"></block>
        </category>
        <category name="Processing & Drawing" colour="210">
            <block type="mp_process"></block>
            <block type="mp_if_results"></block>
            <block type="mp_for_each_landmark"></block>
            <block type="mp_for_each_detection"></block>
            <block type="mp_draw_landmarks"></block>
            <block type="mp_draw_detection"></block>
            <block type="mp_style_background"></block>
        </category>
        <category name="Analysis & Metrics" colour="220">
            <block type="mp_get_landmark_coords"></block>
            <block type="mp_get_specific_landmark"></block>
            <block type="mp_calc_distance"></block>
            <block type="mp_is_finger_extended"></block>
            <block type="mp_classify_hand_gesture"></block>
            <block type="mp_count_raised_fingers"></block>
            <block type="mp_is_mouth_open"></block>
        </category>
    </category>
    <category name="OpenCV" colour="120">
      <block type="cv_imread"></block>
      <block type="cv_imshow"></block>
      <block type="cv_waitkey"></block>
      <block type="cv_destroy_all_windows"></block>
      <block type="cv_imwrite"></block>
      <block type="cv_resize"></block>
      <block type="cv_cvtcolor"></block>
      <block type="cv_add_weighted"></block>
      <block type="cv_threshold"></block>
      <block type="cv_canny"></block>
      <block type="cv_gaussian_blur"></block>
      <block type="cv_draw_line"></block>
      <block type="cv_draw_rectangle"></block>
      <block type="cv_draw_circle"></block>
      <block type="cv_put_text"></block>
      <block type="cv_videocapture"></block>
      <block type="cv_read_and_check"></block>
      <block type="cv_cap_release"></block>
      <block type="cv_get_key_press"></block>
    </category>
    <category name="Tkinter (GUI)" colour="160">
        <block type="tk_create_window"></block>
        <block type="tk_set_title"></block>
        <block type="tk_set_geometry"></block>
        <block type="tk_create_widget"></block>
        <block type="tk_pack_widget"></block>
        <block type="tk_grid_widget"></block>
        <block type="tk_widget_config"></block>
        <block type="tk_entry_get"></block>
        <block type="tk_entry_set"></block>
        <block type="tk_mainloop"></block>
    </category>
    <category name="System" colour="345">
        <block type="sbc_set_brightness"></block>
        <category name="PyAutoGUI" colour="330">
            <block type="pyautogui_get_screen_size"></block>
            <block type="pyautogui_move_to"></block>
            <block type="pyautogui_click"></block>
            <block type="pyautogui_press"></block>

        </category>
    </category>
     <category name="NumPy" colour="260">
        <block type="np_array"></block>
        <block type="np_create_blank_image"></block>
        <block type="np_interp"></block>
        <block type="np_sqrt"></block>

    </category>
    <category name="Text To Speech" colour="50">
        <block type="tts_init"></block>
        <block type="tts_say"></block>
        <block type="tts_run_and_wait"></block>
        <block type="tts_set_property"></block>
        <block type="tts_get_property"></block>
        <block type="tts_get_voice_by_id"></block>
    </category>
    <category name="Time" colour="65">
        <block type="time_sleep"></block>
        <block type="time_get_current"></block>
    </category>
    <category name="Turtle" colour="180">
      <block type="turtle_forward"></block>
      <block type="turtle_backward"></block>
      <block type="turtle_right"></block>
      <block type="turtle_left"></block>
      <sep></sep>
      <block type="turtle_penup"></block>
      <block type="turtle_pendown"></block>
      <block type="turtle_pencolor"></block>
      <block type="turtle_pensize"></block>
      <sep></sep>
      <block type="turtle_goto"></block>
      <block type="turtle_speed"></block>
      <block type="turtle_hideturtle"></block>
      <block type="turtle_showturtle"></block>
      <sep></sep>
      <block type="turtle_begin_fill"></block>
      <block type="turtle_end_fill"></block>
      <sep></sep>
      <block type="turtle_done"></block>
    </category>
    <sep></sep>
    <category name="Python IO/Types" colour="290">
      <block type="python_print"></block>
      <block type="python_input"></block>
      <block type="python_type_cast"></block>
    </category>
    <category name="Logic" colour="%{BKY_LOGIC_HUE}">
        <block type="controls_if"></block>
        <block type="logic_compare"></block>
        <block type="logic_operation"></block>
        <block type="logic_negate"></block>
        <block type="logic_boolean"></block>
    </category>
    <category name="Loops" colour="%{BKY_LOOPS_HUE}">
        <block type="controls_repeat_ext"></block>
        <block type="controls_whileUntil"></block>
        <block type="controls_for"></block>
        <block type="controls_flow_statements"></block>
    </category>
    <category name="Math" colour="%{BKY_MATH_HUE}">
        <block type="math_number"><field name="NUM">123</field></block>
        <block type="math_arithmetic"></block>
        <block type="math_single"></block>
        <block type="math_trig"></block>
        <block type="math_constant"></block>
        <block type="math_number_property"></block>
        <block type="math_round"></block>
        <block type="math_on_list"></block>
        <block type="math_modulo"></block>
        <block type="math_constrain"></block>
        <block type="math_random_int"></block>
        <block type="math_random_float"></block>
    </ag>
    <category name="Text" colour="%{BKY_TEXTS_HUE}">
        <block type="text"></block>
        <block type="text_join"></block>
    </category>
    <category name="Lists" colour="%{BKY_LISTS_HUE}">
        <block type="lists_create_with"></block>
        <block type="lists_getIndex"></block>
    </category>
    <sep></sep>
    <category name="Variables" colour="%{BKY_VARIABLES_HUE}" custom="VARIABLE"></category>
    <category name="Functions" colour="%{BKY_PROCEDURES_HUE}" custom="PROCEDURE"></category>
  </xml>

  <!-- CORRECTED starting blocks to display when the page loads -->
  <xml id="startBlocks" style="display: none">
    <variables>
      <variable>model</variable>
      <variable>camera</variable>
      <variable>frame</variable>
      <variable>detection</variable>
      <variable>frame_rgb</variable>
      <variable>results</variable>
    </variables>
    <block type="variables_set" x="50" y="30">
      <field name="VAR">model</field>
      <value name="VALUE">
        <block type="yolo8_load_model">
          <value name="PATH">
            <shadow type="text">
              <field name="TEXT">yolov8n.pt</field>
            </shadow>
          </value>
        </block>
      </value>
      <next>
        <block type="variables_set">
          <field name="VAR">camera</field>
          <value name="VALUE">
            <block type="cv_videocapture">
              <value name="INDEX">
                <shadow type="math_number">
                  <field name="NUM">0</field>
                </shadow>
              </value>
            </block>
          </value>
          <next>
            <block type="controls_whileUntil">
              <field name="MODE">WHILE</field>
              <value name="BOOL">
                <block type="logic_boolean">
                  <field name="BOOL">TRUE</field>
                </block>
              </value>
              <statement name="DO">
                <block type="cv_read_and_check">
                  <value name="CAPTURE">
                    <shadow type="variables_get">
                      <field name="VAR">camera</field>
                    </shadow>
                  </value>
                  <field name="VAR">frame</field>
                  <statement name="DO">
                    <block type="yolo8_for_each_detection">
                      <field name="VAR">detection</field>
                      <value name="DETECTIONS">
                        <block type="yolo8_detect_objects">
                          <field name="CLASS_FILTER">person</field>
                          <value name="IMAGE">
                            <shadow type="variables_get">
                              <field name="VAR">frame</field>
                            </shadow>
                          </value>
                          <value name="MODEL">
                            <shadow type="variables_get">
                              <field name="VAR">model</field>
                            </shadow>
                          </value>
                          <value name="CONF">
                            <shadow type="math_number">
                              <field name="NUM">0.5</field>
                            </shadow>
                          </value>
                        </block>
                      </value>
                      <statement name="DO">
                        <block type="yolo8_draw_detection">
                          <value name="IMAGE">
                            <shadow type="variables_get">
                              <field name="VAR">frame</field>
                            </shadow>
                          </value>
                          <value name="DETECTION">
                            <shadow type="variables_get">
                              <field name="VAR">detection</field>
                            </shadow>
                          </value>
                        </block>
                      </statement>
                      <next>
                        <block type="cv_imshow">
                          <value name="IMAGE">
                            <shadow type="variables_get">
                              <field name="VAR">frame</field>
                            </shadow>
                          </value>
                          <value name="TITLE">
                            <shadow type="text">
                              <field name="TEXT">YOLOv8 Detection</field>
                            </shadow>
                          </value>
                          <next>
                            <block type="controls_if">
                              <value name="IF0">
                                <block type="logic_compare">
                                  <field name="OP">EQ</field>
                                  <value name="A">
                                    <block type="cv_get_key_press"></block>
                                  </value>
                                  <value name="B">
                                    <shadow type="text">
                                      <field name="TEXT">q</field>
                                    </shadow>
                                  </value>
                                </block>
                              </value>
                              <statement name="DO0">
                                <block type="controls_flow_statements">
                                  <field name="FLOW">BREAK</field>
                                </block>
                              </statement>
                            </block>
                          </next>
                        </block>
                      </next>
                    </block>
                  </statement>
                </block>
              </statement>
              <next>
                <block type="cv_cap_release">
                  <value name="CAPTURE">
                    <shadow type="variables_get">
                      <field name="VAR">camera</field>
                    </shadow>
                  </value>
                  <next>
                    <block type="cv_destroy_all_windows"></block>
                  </next>
                </block>
              </next>
            </block>
          </next>
        </block>
      </next>
    </block>
  </xml>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      
      const pythonGenerator = Blockly.Python;

      // --- HELPER FUNCTIONS FOR IMPORTS ---
      function addTurtleImport() { pythonGenerator.definitions_['import_turtle'] = 'import turtle'; }
      function addCv2Import() { pythonGenerator.definitions_['import_cv2'] = 'import cv2'; }
      function addNumpyImport() { pythonGenerator.definitions_['import_numpy'] = 'import numpy as np'; }
      function addMediaPipeImport() { pythonGenerator.definitions_['import_mediapipe'] = 'import mediapipe as mp'; }
      function addHandsImport() { addMediaPipeImport(); pythonGenerator.definitions_['import_mp_hands'] = 'mp_hands = mp.solutions.hands'; }
      function addPoseImport() { addMediaPipeImport(); pythonGenerator.definitions_['import_mp_pose'] = 'mp_pose = mp.solutions.pose'; }
      function addFaceMeshImport() { addMediaPipeImport(); pythonGenerator.definitions_['import_mp_face_mesh'] = 'mp_face_mesh = mp.solutions.face_mesh'; }
      function addHolisticImport() { addMediaPipeImport(); pythonGenerator.definitions_['import_mp_holistic'] = 'mp_holistic = mp.solutions.holistic'; }
      function addFaceDetectionImport() { addMediaPipeImport(); pythonGenerator.definitions_['import_mp_face_detection'] = 'mp_face_detection = mp.solutions.face_detection'; } 
      function addSelfieSegmentationImport() { addMediaPipeImport(); pythonGenerator.definitions_['import_mp_selfie_segmentation'] = 'mp_selfie_segmentation = mp.solutions.selfie_segmentation'; }
      function addYoloV8Import() { pythonGenerator.definitions_['import_yolo'] = 'from ultralytics import YOLO'; }
      function addPyttsx3Import() { pythonGenerator.definitions_['import_pyttsx3'] = 'import pyttsx3'; }
      function addTimeImport() { pythonGenerator.definitions_['import_time'] = 'import time'; }
      function addPyAutoGUIImport() { pythonGenerator.definitions_['import_pyautogui'] = 'import pyautogui'; }
      function addTkinterImport() { pythonGenerator.definitions_['import_tkinter'] = 'import tkinter as tk'; pythonGenerator.definitions_['import_tkinter_ttk'] = 'from tkinter import ttk'; }
      function addMathImport() { pythonGenerator.definitions_['import_math'] = 'import math'; }
      function addSbcImport() { pythonGenerator.definitions_['import_sbc'] = 'import screen_brightness_control as sbc'; }
      
      const COCO_CLASSES = [
        ["all classes", "all"], ["person", "person"], ["bicycle", "bicycle"], ["car", "car"], ["motorcycle", "motorcycle"], ["airplane", "airplane"], ["bus", "bus"], ["train", "train"], ["truck", "truck"], ["boat", "boat"], ["traffic light", "traffic light"], ["fire hydrant", "fire hydrant"], ["stop sign", "stop sign"], ["parking meter", "parking meter"], ["bench", "bench"], ["bird", "bird"], ["cat", "cat"], ["dog", "dog"], ["horse", "horse"], ["sheep", "sheep"], ["cow", "cow"], ["elephant", "elephant"], ["bear", "bear"], ["zebra", "zebra"], ["giraffe", "giraffe"], ["backpack", "backpack"], ["umbrella", "umbrella"], ["handbag", "handbag"], ["tie", "tie"], ["suitcase", "suitcase"], ["frisbee", "frisbee"], ["skis", "skis"], ["snowboard", "snowboard"], ["sports ball", "sports ball"], ["kite", "kite"], ["baseball bat", "baseball bat"], ["baseball glove", "baseball glove"], ["skateboard", "skateboard"], ["surfboard", "surfboard"], ["tennis racket", "tennis racket"], ["bottle", "bottle"], ["wine glass", "wine glass"], ["cup", "cup"], ["fork", "fork"], ["knife", "knife"], ["spoon", "spoon"], ["bowl", "bowl"], ["banana", "banana"], ["apple", "apple"], ["sandwich", "sandwich"], ["orange", "orange"], ["broccoli", "broccoli"], ["carrot", "carrot"], ["hot dog", "hot dog"], ["pizza", "pizza"], ["donut", "donut"], ["cake", "cake"], ["chair", "chair"], ["couch", "couch"], ["potted plant", "potted plant"], ["bed", "bed"], ["dining table", "dining table"], ["toilet", "toilet"], ["tv", "tv"], ["laptop", "laptop"], ["mouse", "mouse"], ["remote", "remote"], ["keyboard", "keyboard"], ["cell phone", "cell phone"], ["microwave", "microwave"], ["oven", "oven"], ["toaster", "toaster"], ["sink", "sink"], ["refrigerator", "refrigerator"], ["book", "book"], ["clock", "clock"], ["vase", "vase"], ["scissors", "scissors"], ["teddy bear", "teddy bear"], ["hair drier", "hair drier"], ["toothbrush", "toothbrush"]
        ];

      // --- 1. DEFINE CUSTOM BLOCKS (THE SHAPES) ---
      Blockly.defineBlocksWithJsonArray([
        // --- YOLOv8 (Ultralytics) Blocks ---
        { "type": "yolo8_load_model", "message0": "load YOLOv8 model from path %1", "args0": [{"type": "input_value", "name": "PATH", "check": "String"}], "output": "YoloV8Model", "colour": 25, "tooltip": "Loads a YOLOv8 model from a .pt file." },
        { "type": "yolo8_detect_objects", "message0": "in image %1 detect objects using model %2 with confidence > %3 and class name %4", "args0": [ { "type": "input_value", "name": "IMAGE" }, { "type": "input_value", "name": "MODEL", "check": "YoloV8Model" }, { "type": "input_value", "name": "CONF", "check": "Number" }, { "type": "field_dropdown", "name": "CLASS_FILTER", "options": COCO_CLASSES } ], "inputsInline": false, "output": "Array", "colour": 25, "tooltip": "Performs object detection. To detect all classes, set class name to 'all'." },
        { "type": "yolo8_for_each_detection", "message0": "for each %1 in YOLOv8 detections %2", "args0": [{"type": "field_variable", "name": "VAR", "variable": "detection"}, {"type": "input_value", "name": "DETECTIONS", "check": "Array"}], "message1": "%1", "args1": [{"type": "input_statement", "name": "DO"}], "previousStatement": null, "nextStatement": null, "colour": 25, "tooltip": "Iterates through the list of objects found by YOLOv8." },
        { "type": "yolo8_get_detection_info", "message0": "from detection %1 get %2", "args0": [{"type": "input_value", "name": "DETECTION"}, {"type": "field_dropdown", "name": "INFO", "options": [["class name", "class_name"], ["confidence", "confidence"], ["bounding box (x1,y1,x2,y2)", "box"]]}], "output": null, "colour": 25, "tooltip": "Gets specific information from a YOLOv8 detection object." },
        { "type": "yolo8_draw_detection", "message0": "on image %1 draw YOLOv8 detection %2", "args0": [{"type": "input_value", "name": "IMAGE"}, {"type": "input_value", "name": "DETECTION"}], "previousStatement": null, "nextStatement": null, "colour": 25, "tooltip": "Draws the bounding box and label for a YOLOv8 detection on an image." },
        
        // Python-specific Blocks
        { "type": "python_print", "message0": "print %1", "args0": [{"type": "input_value", "name": "TEXT"}], "previousStatement": null, "nextStatement": null, "colour": 290, "tooltip": "Prints a value to the console." },
        { "type": "python_input", "message0": "input with prompt %1", "args0": [{"type": "input_value", "name": "PROMPT", "check": "String"}], "output": "String", "colour": 290, "tooltip": "Gets text input from the user." },
        { "type": "python_type_cast", "message0": "convert %1 to %2", "args0": [ {"type": "input_value", "name": "VALUE"}, {"type": "field_dropdown", "name": "TYPE", "options": [["integer", "int"], ["float", "float"], ["string", "str"]]} ], "output": null, "colour": 290, "tooltip": "Casts a value to a different data type." },
        
        // --- Turtle Blocks ---
        { "type": "turtle_forward", "message0": "turtle forward %1 pixels", "args0": [{ "type": "input_value", "name": "VALUE", "check": "Number" }], "previousStatement": null, "nextStatement": null, "colour": 180 },
        { "type": "turtle_backward", "message0": "turtle backward %1 pixels", "args0": [{ "type": "input_value", "name": "VALUE", "check": "Number" }], "previousStatement": null, "nextStatement": null, "colour": 180 },
        { "type": "turtle_right", "message0": "turtle turn right %1 degrees", "args0": [{ "type": "input_value", "name": "VALUE", "check": "Number" }], "previousStatement": null, "nextStatement": null, "colour": 180 },
        { "type": "turtle_left", "message0": "turtle turn left %1 degrees", "args0": [{ "type": "input_value", "name": "VALUE", "check": "Number" }], "previousStatement": null, "nextStatement": null, "colour": 180 },
        { "type": "turtle_penup", "message0": "turtle pen up", "previousStatement": null, "nextStatement": null, "colour": 180, "tooltip": "Lifts the turtle's pen." },
        { "type": "turtle_pendown", "message0": "turtle pen down", "previousStatement": null, "nextStatement": null, "colour": 180, "tooltip": "Lowers the turtle's pen." },
        { "type": "turtle_pencolor", "message0": "turtle set pen color to %1", "args0": [{ "type": "input_value", "name": "COLOR", "check": "String" }], "previousStatement": null, "nextStatement": null, "colour": 180, "tooltip": "Sets the pen color (e.g., 'red', '#ff0000')." },
        { "type": "turtle_pensize", "message0": "turtle set pen size to %1", "args0": [{ "type": "input_value", "name": "SIZE", "check": "Number" }], "previousStatement": null, "nextStatement": null, "colour": 180, "tooltip": "Sets the thickness of the turtle's pen." },
        { "type": "turtle_goto", "message0": "turtle go to x: %1 y: %2", "args0": [{ "type": "input_value", "name": "X", "check": "Number" }, { "type": "input_value", "name": "Y", "check": "Number" }], "previousStatement": null, "nextStatement": null, "colour": 180, "tooltip": "Moves the turtle to an absolute position." },
        { "type": "turtle_speed", "message0": "turtle set speed to %1", "args0": [{ "type": "input_value", "name": "SPEED", "check": "Number" }], "previousStatement": null, "nextStatement": null, "colour": 180, "tooltip": "Sets the turtle's speed (0=fastest, 1-10=slow to fast)." },

      pythonGenerator.forBlock['mp_draw_detection'] = function(b) { pythonGenerator.definitions_['import_mp_drawing'] = 'mp_drawing = mp.solutions.drawing_utils'; const image = pythonGenerator.valueToCode(b, 'IMAGE', pythonGenerator.ORDER_ATOMIC) || 'None'; const detection = pythonGenerator.valueToCode(b, 'DETECTION', pythonGenerator.ORDER_ATOMIC) || 'None'; return `mp_drawing.draw_detection(${image}, ${detection})\n`; };
      pythonGenerator.forBlock['mp_style_background'] = function(b) { addNumpyImport(); addCv2Import(); const image = pythonGenerator.valueToCode(b, 'IMAGE', pythonGenerator.ORDER_ATOMIC) || 'None'; const results = pythonGenerator.valueToCode(b, 'RESULTS', pythonGenerator.ORDER_ATOMIC) || 'None'; const style = b.getFieldValue('STYLE'); let bg_image_code; if (style === 'BLUR') { bg_image_code = `cv2.GaussianBlur(${image}, (55, 55), 0)`; } else { const color = pythonGenerator.valueToCode(b, 'COLOR', pythonGenerator.ORDER_NONE) || '(192, 192, 192)'; const varName = pythonGenerator.variableDB_.getDistinctName('bg_image', 'VARIABLE'); pythonGenerator.definitions_['bg_image_setup_' + varName] = `${varName} = np.zeros_like(${image}, dtype=np.uint8)\n${varName}[:] = ${color}`; bg_image_code = varName; } const condition = `np.stack((${results}.segmentation_mask,) * 3, axis=-1) > 0.1`; const code = `np.where(${condition}, ${image}, ${bg_image_code})`; return [code, pythonGenerator.ORDER_FUNCTION_CALL]; };
      pythonGenerator.forBlock['mp_get_landmark_coords'] = function(b) { const id=pythonGenerator.valueToCode(b,'ID',pythonGenerator.ORDER_NONE)||0; const l=pythonGenerator.valueToCode(b,'LANDMARK_ITEM',pythonGenerator.ORDER_ATOMIC)||'None'; const i=pythonGenerator.valueToCode(b,'IMAGE',pythonGenerator.ORDER_ATOMIC)||'None'; const code = `(int(${l}.landmark[${id}].x * ${i}.shape[1]), int(${l}.landmark[${id}].y * ${i}.shape[0]))`; return [code, pythonGenerator.ORDER_FUNCTION_CALL]; };
      pythonGenerator.forBlock['mp_get_specific_landmark'] = function(b) { const landmark_item = pythonGenerator.valueToCode(b, 'LANDMARK_ITEM', pythonGenerator.ORDER_ATOMIC) || 'None'; const landmark_id = b.getFieldValue('LANDMARK_NAME'); return [`${landmark_item}.landmark[${landmark_id}]`, pythonGenerator.ORDER_MEMBER]; };
      pythonGenerator.forBlock['mp_calc_distance'] = function(b) { addMathImport(); const p1 = pythonGenerator.valueToCode(b, 'P1', pythonGenerator.ORDER_ATOMIC) || '(0,0)'; const p2 = pythonGenerator.valueToCode(b, 'P2', pythonGenerator.ORDER_ATOMIC) || '(0,0)'; return [`math.sqrt((${p2}[0] - ${p1}[0])**2 + (${p2}[1] - ${p1}[1])**2)`, pythonGenerator.ORDER_FUNCTION_CALL]; };
      pythonGenerator.forBlock['mp_is_finger_extended'] = function(b) { addMathImport(); const hand_landmarks = pythonGenerator.valueToCode(b, 'HAND_LANDMARKS', pythonGenerator.ORDER_ATOMIC) || 'None'; const finger = b.getFieldValue('FINGER');
          const funcName = pythonGenerator.provideFunction_('mp_is_finger_extended',
            ['def ' + pythonGenerator.FUNCTION_NAME_PLACEHOLDER_ + '(hand_landmarks, finger_name):',
            '  if not hand_landmarks: return False', '  lm = hand_landmarks.landmark',
            '  finger_indices = { "Thumb": (4, 2), "Index": (8, 6), "Middle": (12, 10), "Ring": (16, 14), "Pinky": (20, 18) }',
            '  tip_idx, base_idx = finger_indices.get(finger_name, (0,0))', '  if tip_idx == 0: return False',
            '  tip, base, wrist = lm[tip_idx], lm[base_idx], lm[0]',
            '  dist_tip_wrist = math.sqrt((tip.x - wrist.x)**2 + (tip.y - wrist.y)**2)',
            '  dist_base_wrist = math.sqrt((base.x - wrist.x)**2 + (base.y - wrist.y)**2)',
            '  return dist_tip_wrist > dist_base_wrist']
          );
          return [`${funcName}(${hand_landmarks}, '${finger}')`, pythonGenerator.ORDER_FUNCTION_CALL];
      };
      pythonGenerator.forBlock['mp_classify_hand_gesture'] = function(b) { const hand_landmarks = pythonGenerator.valueToCode(b, 'HAND_LANDMARKS', pythonGenerator.ORDER_ATOMIC) || 'None';
          const funcName = pythonGenerator.provideFunction_('mp_classify_hand_gesture',
            ['def ' + pythonGenerator.FUNCTION_NAME_PLACEHOLDER_ + '(hand_landmarks):',
            '  if not hand_landmarks: return "Unknown"', '  lm = hand_landmarks.landmark',
            '  def is_extended(tip, pip): return lm[tip].y < lm[pip].y',
            '  thumb_extended = (lm[4].x < lm[3].x) if (lm[4].x < lm[17].x) else (lm[4].x > lm[3].x)',
            '  index_extended = is_extended(8, 6)', '  middle_extended = is_extended(12, 10)',
            '  ring_extended = is_extended(16, 14)', '  pinky_extended = is_extended(20, 18)',
            '  if thumb_extended and index_extended and middle_extended and ring_extended and pinky_extended: return "Open Hand"',
            '  if not index_extended and not middle_extended and not ring_extended and not pinky_extended: return "Fist"',
            '  if index_extended and middle_extended and not ring_extended and not pinky_extended: return "Peace"',
            '  if index_extended and not middle_extended and not ring_extended and not pinky_extended: return "Pointing"',
            '  return "Unknown"']
          );
          return [`${funcName}(${hand_landmarks})`, pythonGenerator.ORDER_FUNCTION_CALL];
      };
      pythonGenerator.forBlock['mp_count_raised_fingers'] = function(b) {
        const hand_landmarks = pythonGenerator.valueToCode(b, 'HAND_LANDMARKS', pythonGenerator.ORDER_ATOMIC) || 'None';
        const funcName = pythonGenerator.provideFunction_('mp_count_raised_fingers',
            ['def ' + pythonGenerator.FUNCTION_NAME_PLACEHOLDER_ + '(hand_lm):',
             '  if not hand_lm: return 0',
             '  lm = hand_lm.landmark',
             '  finger_tips = [8, 12, 16, 20]',
             '  count = 0',
             '  # For a flipped right hand, a raised thumb has a lower x than the joint below it',
             '  if lm[4].x < lm[3].x:',
             '    count += 1',
             '  # Check 4 fingers (Index to Pinky) based on y-coordinate',
             '  for tip_idx in finger_tips:',
             '    if lm[tip_idx].y < lm[tip_idx - 2].y:',
             '      count += 1',
             '  return count'
            ]
        );
        return [`${funcName}(${hand_landmarks})`, pythonGenerator.ORDER_FUNCTION_CALL];
      };
      pythonGenerator.forBlock['mp_is_mouth_open'] = function(b) { addMathImport(); const face_landmarks = pythonGenerator.valueToCode(b, 'FACE_LANDMARKS', pythonGenerator.ORDER_ATOMIC) || 'None'; const threshold = pythonGenerator.valueToCode(b, 'THRESH', pythonGenerator.ORDER_NONE) || '0.04';
          const funcName = pythonGenerator.provideFunction_('mp_is_mouth_open',
            ['def ' + pythonGenerator.FUNCTION_NAME_PLACEHOLDER_ + '(face_landmarks, threshold):',
             '  if not face_landmarks: return False', '  lm = face_landmarks.landmark',
             '  upper_lip, lower_lip = lm[13], lm[14]',
             '  mouth_opening = math.sqrt((upper_lip.x - lower_lip.x)**2 + (upper_lip.y - lower_lip.y)**2)',
             '  mouth_left, mouth_right = lm[61], lm[291]',
             '  mouth_width = math.sqrt((mouth_left.x - mouth_right.x)**2 + (mouth_left.y - mouth_right.y)**2)',
             '  if mouth_width == 0: return False',
             '  return (mouth_opening / mouth_width) > threshold'
            ]
          );
          return [`${funcName}(${face_landmarks}, ${threshold})`, pythonGenerator.ORDER_FUNCTION_CALL];
      };
      
      // pyttsx3 Generators
      pythonGenerator.forBlock['tts_init'] = function(b) { addPyttsx3Import(); return ['pyttsx3.init()', pythonGenerator.ORDER_FUNCTION_CALL]; };
      pythonGenerator.forBlock['tts_say'] = function(b) { const engine = pythonGenerator.valueToCode(b, 'ENGINE', pythonGenerator.ORDER_ATOMIC) || 'None'; const text = pythonGenerator.valueToCode(b, 'TEXT', pythonGenerator.ORDER_NONE) || "''"; return `${engine}.say(${text})\n`; };
      pythonGenerator.forBlock['tts_run_and_wait'] = function(b) { const engine = pythonGenerator.valueToCode(b, 'ENGINE', pythonGenerator.ORDER_ATOMIC) || 'None'; return `${engine}.runAndWait()\n`; };
      pythonGenerator.forBlock['tts_set_property'] = function(b) { const engine = pythonGenerator.valueToCode(b, 'ENGINE', pythonGenerator.ORDER_ATOMIC) || 'None'; const prop = b.getFieldValue('PROP'); const value = pythonGenerator.valueToCode(b, 'VALUE', pythonGenerator.ORDER_NONE) || "''"; let final_value = value; if (prop === 'voice') { final_value = `${value}.id`; } return `${engine}.setProperty('${prop}', ${final_value})\n`; };
      pythonGenerator.forBlock['tts_get_property'] = function(b) { const engine = pythonGenerator.valueToCode(b, 'ENGINE', pythonGenerator.ORDER_ATOMIC) || 'None'; const prop = b.getFieldValue('PROP'); return [`${engine}.getProperty('${prop}')`, pythonGenerator.ORDER_FUNCTION_CALL]; };
      pythonGenerator.forBlock['tts_get_voice_by_id'] = function(b) { const id = pythonGenerator.valueToCode(b, 'ID', pythonGenerator.ORDER_NONE) || 0; const voices = pythonGenerator.valueToCode(b, 'VOICES', pythonGenerator.ORDER_ATOMIC) || '[]'; return [`${voices}[${id}]`, pythonGenerator.ORDER_MEMBER]; };

      // Time Generators
      pythonGenerator.forBlock['time_sleep'] = function(b) { addTimeImport(); const seconds = pythonGenerator.valueToCode(b, 'SECONDS', pythonGenerator.ORDER_NONE) || 0; return `time.sleep(${seconds})\n`; };
      pythonGenerator.forBlock['time_get_current'] = function(b) { addTimeImport(); return ['time.time()', pythonGenerator.ORDER_FUNCTION_CALL]; };
      
      // System & PyAutoGUI Generators
      pythonGenerator.forBlock['sbc_set_brightness'] = function(b) { addSbcImport(); const brightness = pythonGenerator.valueToCode(b, 'BRIGHTNESS', pythonGenerator.ORDER_NONE) || 0; const code = `try:\n  sbc.set_brightness(${brightness})\nexcept Exception:\n  pass\n`; return code; };
      pythonGenerator.forBlock['pyautogui_get_screen_size'] = function(b) { addPyAutoGUIImport(); return ['pyautogui.size()', pythonGenerator.ORDER_FUNCTION_CALL]; };
      pythonGenerator.forBlock['pyautogui_move_to'] = function(b) { addPyAutoGUIImport(); const x = pythonGenerator.valueToCode(b, 'X', pythonGenerator.ORDER_NONE) || 0; const y = pythonGenerator.valueToCode(b, 'Y', pythonGenerator.ORDER_NONE) || 0; return `pyautogui.moveTo(${x}, ${y})\n`; };
      pythonGenerator.forBlock['pyautogui_click'] = function(b) { addPyAutoGUIImport(); return `pyautogui.click()\n`; };
      pythonGenerator.forBlock['pyautogui_press'] = function(b) { addPyAutoGUIImport(); const key = pythonGenerator.valueToCode(b, 'KEY', pythonGenerator.ORDER_NONE) || "''"; return `pyautogui.press(${key})\n`; };
      pythonGenerator.forBlock['pyautogui_write'] = function(b) { addPyAutoGUIImport(); const text = pythonGenerator.valueToCode(b, 'TEXT', pythonGenerator.ORDER_NONE) || "''"; return `pyautogui.write(${text})\n`; };
      
      // NumPy Generators
      pythonGenerator.forBlock['np_array'] = function(b) { addNumpyImport(); const list = pythonGenerator.valueToCode(b, 'LIST', pythonGenerator.ORDER_NONE) || '[]'; return [`np.array(${list})`, pythonGenerator.ORDER_FUNCTION_CALL]; };
      pythonGenerator.forBlock['np_create_blank_image'] = function(b) { addNumpyImport(); const w = pythonGenerator.valueToCode(b, 'WIDTH', pythonGenerator.ORDER_NONE) || 640; const h = pythonGenerator.valueToCode(b, 'HEIGHT', pythonGenerator.ORDER_NONE) || 480; const color = pythonGenerator.valueToCode(b, 'COLOR', pythonGenerator.ORDER_NONE) || '(255, 255, 255)'; return [`np.full((${h}, ${w}, 3), ${color}, dtype=np.uint8)`, pythonGenerator.ORDER_FUNCTION_CALL]; };
      pythonGenerator.forBlock['np_interp'] = function(b) { addNumpyImport(); const x = pythonGenerator.valueToCode(b, 'X', pythonGenerator.ORDER_NONE) || 0; const xp = pythonGenerator.valueToCode(b, 'XP', pythonGenerator.ORDER_NONE) || '[0, 1]'; const fp = pythonGenerator.valueToCode(b, 'FP', pythonGenerator.ORDER_NONE) || '[0, 100]'; return [`np.interp(${x}, ${xp}, ${fp})`, pythonGenerator.ORDER_FUNCTION_CALL]; };
      pythonGenerator.forBlock['np_sqrt'] = function(b) { addNumpyImport(); const num = pythonGenerator.valueToCode(b, 'NUM', pythonGenerator.ORDER_NONE) || 0; return [`np.sqrt(${num})`, pythonGenerator.ORDER_FUNCTION_CALL]; };
      pythonGenerator.forBlock['np_zeros_like'] = function(b) { addNumpyImport(); const arr = pythonGenerator.valueToCode(b, 'ARRAY', pythonGenerator.ORDER_ATOMIC) || 'None'; return [`np.zeros_like(${arr})`, pythonGenerator.ORDER_FUNCTION_CALL]; };
      
      // Tkinter Generators
      pythonGenerator.forBlock['tk_create_window'] = function(b) { addTkinterImport(); return ['tk.Tk()', pythonGenerator.ORDER_FUNCTION_CALL]; };
      pythonGenerator.forBlock['tk_set_title'] = function(b) { const win = pythonGenerator.valueToCode(b, 'WINDOW', pythonGenerator.ORDER_ATOMIC) || 'root'; const title = pythonGenerator.valueToCode(b, 'TITLE', pythonGenerator.ORDER_NONE) || "''"; return `${win}.title(${title})\n`; };
      pythonGenerator.forBlock['tk_set_geometry'] = function(b) { const win = pythonGenerator.valueToCode(b, 'WINDOW', pythonGenerator.ORDER_ATOMIC) || 'root'; const geo = pythonGenerator.valueToCode(b, 'GEOMETRY', pythonGenerator.ORDER_NONE) || "'400x300'"; return `${win}.geometry(${geo})\n`; };
      pythonGenerator.forBlock['tk_create_widget'] = function(b) { addTkinterImport(); const widget = b.getFieldValue('WIDGET'); const parent = pythonGenerator.valueToCode(b, 'PARENT', pythonGenerator.ORDER_ATOMIC) || 'root'; const options = pythonGenerator.valueToCode(b, 'OPTIONS', pythonGenerator.ORDER_NONE) || ""; const finalOptions = options.substring(1, options.length - 1); return [`ttk.${widget}(${parent}, ${finalOptions})`, pythonGenerator.ORDER_FUNCTION_CALL]; };
      pythonGenerator.forBlock['tk_pack_widget'] = function(b) { const widget = pythonGenerator.valueToCode(b, 'WIDGET', pythonGenerator.ORDER_ATOMIC) || 'None'; const options = pythonGenerator.valueToCode(b, 'OPTIONS', pythonGenerator.ORDER_NONE) || ""; const finalOptions = options.substring(1, options.length - 1); return `${widget}.pack(${finalOptions})\n`; };
      pythonGenerator.forBlock['tk_grid_widget'] = function(b) { const widget = pythonGenerator.valueToCode(b, 'WIDGET', pythonGenerator.ORDER_ATOMIC) || 'None'; const options = pythonGenerator.valueToCode(b, 'OPTIONS', pythonGenerator.ORDER_NONE) || ""; return `${widget}.grid(${options})\n`; };
      pythonGenerator.forBlock['tk_widget_config'] = function(b) { const widget = pythonGenerator.valueToCode(b, 'WIDGET', pythonGenerator.ORDER_ATOMIC) || 'None'; const options = pythonGenerator.valueToCode(b, 'OPTIONS', pythonGenerator.ORDER_NONE) || ""; return `${widget}.config(${options})\n`; };
      pythonGenerator.forBlock['tk_entry_get'] = function(b) { const widget = pythonGenerator.valueToCode(b, 'WIDGET', pythonGenerator.ORDER_ATOMIC) || 'None'; return [`${widget}.get()`, pythonGenerator.ORDER_FUNCTION_CALL]; };
      pythonGenerator.forBlock['tk_entry_set'] = function(b) { const widget = pythonGenerator.valueToCode(b, 'WIDGET', pythonGenerator.ORDER_ATOMIC) || 'None'; const text = pythonGenerator.valueToCode(b, 'TEXT', pythonGenerator.ORDER_NONE) || "''"; return `${widget}.delete(0, 'end')\n${widget}.insert(0, ${text})\n`; };
      pythonGenerator.forBlock['tk_mainloop'] = function(b) { const win = pythonGenerator.valueToCode(b, 'WINDOW', pythonGenerator.ORDER_ATOMIC) || 'root'; return `${win}.mainloop()\n`; };
      
      pythonGenerator.forBlock['tk_widget_bind'] = function(b) { addTkinterImport(); const widget = pythonGenerator.valueToCode(b, 'WIDGET', pythonGenerator.ORDER_ATOMIC) || 'None'; const event = pythonGenerator.valueToCode(b, 'EVENT', pythonGenerator.ORDER_NONE) || "''"; const func = pythonGenerator.valueToCode(b, 'FUNCTION', pythonGenerator.ORDER_NONE) || 'None'; return `${widget}.bind(${event}, ${func})\n`; };
      pythonGenerator.forBlock['tk_treeview_action'] = function(b) { addTkinterImport(); const widget = pythonGenerator.valueToCode(b, 'WIDGET', pythonGenerator.ORDER_ATOMIC) || 'None'; const action = b.getFieldValue('ACTION'); const parent = pythonGenerator.valueToCode(b, 'PARENT', pythonGenerator.ORDER_NONE) || "''"; const index = pythonGenerator.valueToCode(b, 'INDEX', pythonGenerator.ORDER_NONE) || "'end'"; const values = pythonGenerator.valueToCode(b, 'VALUES', pythonGenerator.ORDER_NONE) || "()"; if (action === 'insert') { return `${widget}.insert(parent=${parent}, index=${index}, values=${values})\n`; } if (action === 'delete_all') { return `${widget}.delete(*${widget}.get_children())\n`; } if (action === 'selection') { return [`${widget}.selection()`, pythonGenerator.ORDER_FUNCTION_CALL]; } if (action === 'item') { const item_id = parent; return [`${widget}.item(${item_id}, 'values')`, pythonGenerator.ORDER_FUNCTION_CALL]; } };
      pythonGenerator.forBlock['tk_treeview_config'] = function(b) { addTkinterImport(); const widget = pythonGenerator.valueToCode(b, 'WIDGET', pythonGenerator.ORDER_ATOMIC) || 'None'; const target = b.getFieldValue('TARGET'); const name = pythonGenerator.valueToCode(b, 'NAME', pythonGenerator.ORDER_NONE) || "''"; const options = pythonGenerator.valueToCode(b, 'OPTIONS', pythonGenerator.ORDER_NONE) || ""; return `${widget}.${target}(${name}, ${options})\n`; };
      pythonGenerator.forBlock['tk_messagebox'] = function(b) { pythonGenerator.definitions_['import_tkinter_messagebox'] = 'from tkinter import messagebox'; const type = b.getFieldValue('TYPE'); const title = pythonGenerator.valueToCode(b, 'TITLE', pythonGenerator.ORDER_NONE) || "''"; const message = pythonGenerator.valueToCode(b, 'MESSAGE', pythonGenerator.ORDER_NONE) || "''"; return [`messagebox.${type}(title=${title}, message=${message})`, pythonGenerator.ORDER_FUNCTION_CALL]; };

      

      // --- 3. INITIALIZE THE APP ---
      const workspace = Blockly.inject('blocklyDiv', {
        toolbox: document.getElementById('toolbox'),
        grid: { spacing: 20, length: 3, colour: '#ccc', snap: true },
        trashcan: true,
        zoom: { controls: true, wheel: true, startScale: 0.9, maxScale: 3, minScale: 0.3, scaleSpeed: 1.2 }
      });

      const codeArea = document.getElementById('codeArea');
      const copyButton = document.getElementById('copyButton');
      const saveButton = document.getElementById('saveButton');
      const loadButton = document.getElementById('loadButton');
      const loadInput = document.getElementById('loadInput');
      
      function updatePythonCode() {
        try {
          pythonGenerator.init(workspace);
          const code = pythonGenerator.workspaceToCode(workspace);
          codeArea.textContent = code || "# Drag blocks from the toolbox to start...";
        } catch(e) {
          console.error("Error during code generation:", e);
          codeArea.textContent = "# Error generating code. See developer console for details.";
        }
      }

      function copyCode() {
        navigator.clipboard.writeText(codeArea.textContent).then(() => {
          copyButton.textContent = 'Copied!';
          setTimeout(() => { copyButton.textContent = 'Copy Python Code'; }, 1500);
        }).catch(err => {
          console.error('Failed to copy code: ', err);
          alert('Failed to copy code. See console for details.');
        });
      }

      function saveWorkspace() {
        try {
          const xml = Blockly.Xml.workspaceToDom(workspace);
          const xmlText = Blockly.Xml.domToText(xml);
          
          const blob = new Blob([xmlText], { type: 'text/xml' });
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = 'blockly-project.xml';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(a.href);

        } catch (e) {
          console.error("Error saving workspace:", e);
          alert("Could not save the project. See console for details.");
        }
      }

      function loadWorkspace(event) {
        const file = event.target.files[0];
        if (!file) { return; }
        const reader = new FileReader();
        reader.onload = function(e) {
          const xmlText = e.target.result;
          try {
            const xml = Blockly.utils.xml.textToDom(xmlText);
            workspace.clear(); 
            Blockly.Xml.domToWorkspace(xml, workspace);
          } catch (err) {
            console.error("Error loading workspace from XML:", err);
            alert("Error: Could not load the project file. It may be corrupted or not a valid Blockly project file.");
          }
        };
        reader.onerror = function(e) { console.error("File reader error:", e); alert("Error reading the project file."); }
        reader.readAsText(file);
        event.target.value = ''; 
      }
      
      workspace.addChangeListener(function(event) {
        // Hide/show the color input for the background styler block
        if (event.type == Blockly.Events.CHANGE && event.element == 'field') {
          const block = workspace.getBlockById(event.blockId);
          if (block && block.type == 'mp_style_background') {
            const isColor = block.getFieldValue('STYLE') === 'COLOR';
            block.getInput('COLOR').setVisible(isColor);
          }
        }
        updatePythonCode(); 
      });
      
      copyButton.addEventListener('click', copyCode);
      saveButton.addEventListener('click', saveWorkspace);
      loadButton.addEventListener('click', () => loadInput.click()); 
      loadInput.addEventListener('change', loadWorkspace);
      
      const startBlocks = document.getElementById('startBlocks');
      Blockly.Xml.domToWorkspace(startBlocks, workspace);
      workspace.scrollCenter();

      // Initial check for visibility on loaded blocks
      const allBlocks = workspace.getAllBlocks(false);
      for(let i = 0; i < allBlocks.length; i++) {
        const block = allBlocks[i];
        if (block.type == 'mp_style_background') {
           const isColor = block.getFieldValue('STYLE') === 'COLOR';
           block.getInput('COLOR').setVisible(isColor);
        }
      }

      // Initial code generation
      updatePythonCode();
    });
  </script>
